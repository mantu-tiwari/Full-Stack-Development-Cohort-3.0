<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fintrack Pro</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ4cyVyBuzB9Z8JDbqmZnQKR5BZnVUzAZMOdgQBK8TOWbfYXVx4IrMLodA&s=10" type="image/x-icon">
    <script src="https://kit.fontawesome.com/90bf4f9655.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <!----------------------------------------- Aside  -->
    <aside>
      <div class="top">
        <div class="logo">
          <div class="icon">
            <i class="fa-solid fa-coins"></i>
          </div>
          <div class="text">
            <h2>FinTrack Pro</h2>
            <p>Enterprise Finance</p>
          </div>
        </div>
        <div class="functionality">
          <div class="dashboard">
            <i class="ri-dashboard-line"></i>
            <h3>Dashboard</h3>
          </div>
          <div class="setting">
            <i class="ri-settings-line"></i>
            <h3>Setting</h3>
          </div>
        </div>
      </div>
      <div class="bottom">
        <button class="transaction-btn">
          <h3><span>+</span> Add Transaction</h3>
        </button>
      </div>
    </aside>

    <main>
      <!-- Section 1 -->
      <section class="sec-1">
        <div class="hero-txt">
          <h1>Financial Overview</h1>
          <p>Real-time tracking application</p>
        </div>
        <div class="summary-card">
          <div id="balance" class="cards">
            <i class="fa-solid fa-building-columns"></i>
            <p>Current Balance</p>
            <h2>amount</h2>
          </div>
          <div id="income" class="cards">
            <i class="fa-solid fa-arrow-trend-up"></i>
            <p>Total Income</p>
            <h2>amount</h2>
          </div>
          <div id="expense" class="cards">
            <i class="fa-solid fa-arrow-trend-down"></i>
            <p>Total Expense</p>
            <h2>amount</h2>
          </div>
          <div id="total" class="cards">
            <i class="fa-solid fa-piggy-bank"></i>
            <p>Total Transaction</p>
            <h2>amount</h2>
          </div>
        </div>
      </section>

      <!-- Section 2 - Cash flow Chart -->
      <section class="sec-2">
        <div class="cashflow">
          <h2>Cash Flow Analysis</h2>
          <div class="graph"></div>
        </div>
        <div class="preferences">
          <h2>Preferences</h2>
          <div class="dark-mode">
            <h4>Dark Mode</h4>
            <div class="toggle">
                <div class="toggle-btn"></div>
            </div>
          </div>
          <button class="reset-btn">Reset All Data</button>
        </div>
      </section>

      <!-- Section 3 - Transaction Details -->
      <section class="sec-3">
        <h2>All Transaction</h2>
        <div class="operation">
          <input type="text" placeholder="Search Transaction..." />
          <select name="" id="">
            <option value="All Type">All Type</option>
            <option value="Income Only">Income Only</option>
            <option value="Expense Only">Expense Only</option>
          </select>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
