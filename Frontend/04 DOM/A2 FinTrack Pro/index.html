<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fintrack Pro</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://kit.fontawesome.com/90bf4f9655.js" crossorigin="anonymous"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>

      <!----------------------------------------- Aside  -->
      <aside>
        <div class="top">
          <div class="logo">
            <div class="icon">
              <i class="ri-funds-fill"></i>
            </div>
            <div class="text">
              <h2>FinTrack Pro</h2>
              <p>Enterprise Finance</p>
            </div>
            <div class="functionality">
              <div class="dashboard">
                <i class="ri-dashboard-line"></i>
                <h2>Dashboard</h2>
              </div>
              <div class="setting">
                <i class="ri-settings-line"></i>
                <h2>Setting</h2>
              </div>
            </div>
          </div>
        </div>
        <div class="bottom">
          <button class="transaction-btn">
            <h3><span>+</span> Add Transaction</h3>
          </button>
        </div>
      </aside>

      <!-- Section 1 -->
       <section class="sec-1">
        <div class="hero-txt">
            <h1>Financial Overview</h1>
            <p>Real-time tracking application</p>
        </div>
        <div class="summary-card">
            <div class="balance">
                <i class="fa-solid fa-building-columns"></i>
                <h4>Current Balance</h4>
                <h2>amount</h2>
            </div>
            <div class="income">
                <i class="fa-solid fa-arrow-trend-up"></i>
                <h4>Current Balance</h4>
                <h2>amount</h2>
            </div>
            <div class="expense">
                <i class="fa-solid fa-arrow-trend-down"></i>
                <h4>Current Balance</h4>
                <h2>amount</h2>
            </div>
            <div class="total">
                <i class="fa-solid fa-piggy-bank"></i>
                <h4>Current Balance</h4>
                <h2>amount</h2>
            </div>
        </div>
       </section>


    </main>
    <script src="script.js"></script>
  </body>
</html>
