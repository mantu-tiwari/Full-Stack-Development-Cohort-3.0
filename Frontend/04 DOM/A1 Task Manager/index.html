  <head>

    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/128/17836/17836274.png" type="image/x-icon">
  </head>
  <body>
    <main>
        <!------------------------- Nav -->
      <nav>
        <h1>Task Manager</h1>
        <div class="dark-mode"><i class="ri-moon-fill"></i></div>
      </nav>

      <!------------------------- Create Button -->
      <div class="create-btn">
        <button>Create Task</button>
      </div>

      <!------------------------------ Task Container Section -->
      <section class="task-container">
        <!-- <div class="top">
          <h4>Task</h4>
          <div class="search-box">
            <input type="text" placeholder="Search Task" />
            <button><i class="ri-search-line"></i></button>
          </div> -->
        </div>
        <div class="bottom">
          <!-- <div class="task">
            <div class="task-text">
              <h3>Task title</h3>
              <p>Task Category</p>
            </div>
            <div class="task-btn">
              <button class="edit">Edit</button>
              <button class="complete">Complete</button>
              <button class="delete">Delete</button>
            </div>
          </div> -->
        </div>
      </section>

      <!----------------------------------- Form -->
      <div class="form">
        <i class="ri-close-circle-line"></i>
        <form>
          <label for="task-title">Task Title</label>
          <input type="text" placeholder="Enter Task Title" />
          <label for="escription">Description</label>
          <input type="text" placeholder="Enter Description" />
          <label for="category">Category</label>
          <select name="task" id="task">
            <option selected value="Not Defined">All Categories</option>
            <option value="Personal">Personal</option>
            <option value="Study">Study</option>
            <option value="Shopping">Shopping</option>
            <option value="Health">Health</option>
          </select>
          <button class="add-task">Add Task</button>
        </form>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
