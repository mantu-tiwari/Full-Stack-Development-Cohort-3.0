<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Project Self Practice</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
  </head>
  <body>

    <h1>Easy</h1>

    <div>
        <h2>1. Counter App</h2>
        <p class="result">Count : 0</p>
        <button class="plus">[+]</button>
        <button class="minus">[-]</button>
    </div>

    <div>
        <h2>2. Show/Hide Password</h2>
        <input class="password" type="password" placeholder="Enter Your Password">
        <i class="ri-eye-off-fill"></i>
        <p class="show"></p>
    </div>

    <div>
        <h2>3. Character Counter</h2>
        <input class="char" type="text" placeholder="Enter word">
        <p class="store">Count : 0</p>
    </div>
     
    <div>
        <h2>4. Color Changer</h2>
        <div class="box"></div>
        <button class="red">Red</button>
        <button class="blue">Blue</button>
        <button class="green">Green</button>
        <button class="yellow">Yellow</button>
    </div>

    <div>
        <h2>5. Dark Mode Toggle</h2>
        <div class="togg">
            <div class="circle"></div>
        </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
