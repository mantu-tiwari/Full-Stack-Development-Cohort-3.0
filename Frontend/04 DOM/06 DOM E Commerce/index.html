<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM E Commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <!-- Navbar -->
        <nav>
            <h1>E-Commerce</h1>
            <button class="create">Create Button</button>
        </nav>
        <!-- Hero Section -->
        <div class="product">
            <div class="product-card">
                <div class="pic">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRWIsCb8yrb_WpvRVk4SXa4Y89rGW4_uTrxCTbeeYJDJF-INwVG8njgZtt5&s=10" alt="">
                </div>
                <div class="text">
                    <h3>Name</h3>
                    <h4>Description</h4>
                    <h5>Price</h5>
                </div>
                <div class="btns">
                    <button class="update">Update</button>
                    <button class="delete">Delete</button>
                </div>
            </div>
        </div>
        <!-- Forn -->
        <div class="form">
            <form>
                <h2>Create Products</h2>
                <input type="text" placeholder="Product Name">
                <input type="text" placeholder="Description">
                <input type="number" placeholder="Price">
                <input type="url" placeholder="Image URL">
                <button class="form-btn">Create</button>
            </form>
        </div>

    </main>
    
    <script src="script.js"></script>
</body>
</html>
